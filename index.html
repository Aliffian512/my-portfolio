<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Rafi</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;scroll-behavior:smooth;}
body{background:#0f172a;color:white;}

/* NAVBAR */
nav{
position:fixed;width:100%;background:#0f172a;
padding:15px 10%;display:flex;justify-content:space-between;align-items:center;z-index:1000;
}
nav a{color:white;text-decoration:none;margin-left:20px;transition:0.3s;}
nav a:hover{color:#38bdf8;}

/* HEADER */
header{
height:100vh;display:flex;flex-direction:column;
justify-content:center;align-items:center;text-align:center;padding:0 10%;
}
header h1{font-size:50px;}
header span{color:#38bdf8;}
header p{margin-top:15px;color:#94a3b8;}

.btn{
margin-top:20px;padding:12px 25px;background:#38bdf8;color:black;
text-decoration:none;border-radius:5px;font-weight:bold;display:inline-block;transition:0.3s;
}
.btn:hover{background:#0ea5e9;}

section{padding:100px 10%;}
h2{text-align:center;margin-bottom:50px;font-size:35px;}

.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:40px;
}

.card{
background:#1e293b;
border-radius:20px;
padding:30px 20px;
display:flex;
flex-direction:column;
align-items:center;
}

/* ===================== */
/* ANDROID SLIDER FIXED  */
/* ===================== */

.slider-android{
position:relative;
max-width:280px;              /* lebih ramping */
width:100%;
aspect-ratio:9/16;            /* rasio HP */
margin-top:40px;
overflow:hidden;
border-radius:30px;
background:white;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.slider-android .slides{
display:flex;
transition:transform 0.6s ease-in-out;
height:100%;
}

.slider-android .slide{
flex:0 0 100%;
width:100%;
height:100%;
object-fit:contain;           /* tidak terpotong */
background:white;
}

/* ===================== */
/* WEBSITE SLIDER FIXED  */
/* ===================== */

.slider-web{
position:relative;
width:100%;
aspect-ratio:16/9;            /* proporsional desktop */
overflow:hidden;
border-radius:20px;
background:#0f172a;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

.slider-web .slides{
display:flex;
transition:transform 0.6s ease-in-out;
height:100%;
}

.slider-web .slide{
flex:0 0 100%;
width:100%;
height:100%;
object-fit:contain;
background:#0f172a;
}

/* Arrow */
.prev,.next{
position:absolute;top:50%;transform:translateY(-50%);
background:rgba(0,0,0,0.5);color:white;border:none;
padding:10px 15px;cursor:pointer;border-radius:5px;
}
.prev{left:10px;} 
.next{right:10px;}

/* Dots */
.dots{
position:absolute;
bottom:15px;
width:100%;
text-align:center;
}
.dot{
height:10px;width:10px;margin:0 4px;
background:rgba(255,255,255,0.4);
display:inline-block;border-radius:50%;cursor:pointer;
}
.active-dot{background:#38bdf8;}

.card-content{
margin-top:25px;
text-align:center;
}

footer{text-align:center;padding:20px;background:#1e293b;}

@media(max-width:768px){
.slider-android{max-width:220px;}
}
</style>
</head>

<body>

<script>
document.querySelectorAll(".slider").forEach(slider=>{
const slides=slider.querySelector(".slides");
const images=slider.querySelectorAll(".slide");
const prev=slider.querySelector(".prev");
const next=slider.querySelector(".next");
const dotsContainer=slider.querySelector(".dots");
let index=0;

images.forEach((_,i)=>{
const dot=document.createElement("span");
dot.classList.add("dot");
if(i===0) dot.classList.add("active-dot");
dot.addEventListener("click",()=>{index=i;update();});
dotsContainer.appendChild(dot);
});
const dots=slider.querySelectorAll(".dot");

function update(){
slides.style.transform=`translateX(-${index*100}%)`;
dots.forEach(d=>d.classList.remove("active-dot"));
dots[index].classList.add("active-dot");
}

next.addEventListener("click",()=>{index=(index+1)%images.length;update();});
prev.addEventListener("click",()=>{index=(index-1+images.length)%images.length;update();});

setInterval(()=>{index=(index+1)%images.length;update();},4000);
});
</script>
